name: Deploy Backend (FIFA 2026 API)

# Empacota o backend Node.js (com node_modules de produção e web.config
# do iisnode) e publica no Azure Web App for Windows.
#
# Triggers:
#   - workflow_dispatch (manual)
#   - push em main: roda quando algo em fifa2026-api/ ou neste workflow muda

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Azure Web App name (backend)'
        required: true
        default: 'fifa2026-back'
  push:
    branches: [main]
    paths:
      - 'fifa2026-api/**'
      - '.github/workflows/deploy-backend.yml'

env:
  WORKING_DIR: 'fifa2026-api'
  NODE_VERSION: '18'
  DEFAULT_APP_NAME: 'fifa2026-back'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install production dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci --omit=dev

      - name: Cleanup before packaging
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          rm -rf logs src/logs
          rm -f .env

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          # Precedência: input manual → GitHub Variable (aluno) → default (prod legado)
          app-name: ${{ github.event.inputs.app_name || vars.BACKEND_APP_NAME || env.DEFAULT_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: ${{ env.WORKING_DIR }}
