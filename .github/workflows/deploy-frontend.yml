name: Deploy Frontend (FIFA 2026 Web)

# Builda o frontend com a BACKEND_URL embutida no web.config e
# publica no Azure Web App definido nos inputs.
#
# Triggers:
#   - workflow_dispatch (manual): permite escolher backend_url e app_name
#   - push em main: roda quando algo no Lovable/ ou neste workflow muda

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'BACKEND_URL embutida no web.config (proxy /api -> aqui)'
        required: true
        default: 'https://fifa2026-back.azurewebsites.net'
      app_name:
        description: 'Azure Web App name (frontend)'
        required: true
        default: 'fifa2026-web'
  push:
    branches: [main]
    paths:
      - 'Lovable/World Cup Tickets Hub/**'
      - '.github/workflows/deploy-frontend.yml'

env:
  WORKING_DIR: 'Lovable/World Cup Tickets Hub'
  NODE_VERSION: '20'
  # Defaults usados quando o trigger é push (sem inputs manuais)
  DEFAULT_BACKEND_URL: 'https://fifa2026-back.azurewebsites.net'
  DEFAULT_APP_NAME: 'fifa2026-web'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Build (vite + set-backend-url)
        working-directory: ${{ env.WORKING_DIR }}
        env:
          # BACKEND_URL → substituído no web.config (proxy reverso, usado em VMs)
          BACKEND_URL: ${{ github.event.inputs.backend_url || env.DEFAULT_BACKEND_URL }}
          # VITE_API_URL → embutido no bundle JS (cliente chama URL absoluta)
          # Necessário em Azure App Service B1 onde ARR proxy outbound não funciona
          VITE_API_URL: ${{ github.event.inputs.backend_url || env.DEFAULT_BACKEND_URL }}/api
        run: npm run build

      - name: Verify VITE_API_URL embedded
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if ! grep -q "fifa2026-back\|${{ github.event.inputs.backend_url || env.DEFAULT_BACKEND_URL }}" dist/assets/*.js; then
            echo "::error::VITE_API_URL não foi embutido no bundle JS"
            exit 1
          fi
          echo "VITE_API_URL embutido com sucesso"

      - name: Verify web.config substitution
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if grep -q '__BACKEND_URL__' dist/web.config; then
            echo "::error::Placeholder __BACKEND_URL__ ainda presente em dist/web.config"
            exit 1
          fi
          echo "BACKEND_URL final no web.config:"
          grep -E 'Rewrite url=' dist/web.config | head -1

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.event.inputs.app_name || env.DEFAULT_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: '${{ env.WORKING_DIR }}/dist'
